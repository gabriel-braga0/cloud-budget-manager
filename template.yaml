AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Infraestrutura do Cloud Budget Manager (DynamoDB, SNS, SQS)

Resources:
  CloudBudgetTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CloudBudgetTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ExpenseAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: expense-alerts-topic

  ExpenseAlertQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: expense-alerts-queue

  ExpenseAlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref ExpenseAlertTopic
      Endpoint: !GetAtt ExpenseAlertQueue.Arn

  ExpenseAlertQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ExpenseAlertQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt ExpenseAlertQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref ExpenseAlertTopic

    ExpenseAlertLambda:
      Type: AWS::Serverless::Function
      Properties:
        FunctionName: expense-alert-lambda
        Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
        Runtime: java21
        CodeUri: /tmp/target/function.zip
        MemorySize: 512
        Timeout: 15
        Environment:
          Variables:
            QUARKUS_LAMBDA_HANDLER: expenseAlertLambda
        Events:
          SQSMessageTrigger:
            Type: SQS
            Properties:
              Queue: !GetAtt ExpenseAlertQueue.Arn
              BatchSize: 5